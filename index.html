<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>臺南市護理人員歷屆考題測驗</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">歷屆考題測驗</p>
          <h1 id="app-title">臺南市護理人員公開甄選</h1>
        </div>
        <div class="summary" id="summary">載入題庫中</div>
      </section>

      <section class="year-panel" aria-labelledby="year-title">
        <div>
          <h2 id="year-title">選擇年份</h2>
          <p>題目與答案皆由目錄內 PDF 抽取，作答後只列出錯題與官方正確解答。</p>
        </div>
        <div class="year-buttons" id="year-buttons"></div>
      </section>

      <section class="quiz-panel hidden" id="quiz-panel" aria-live="polite">
        <div class="quiz-header">
          <div>
            <p class="eyebrow" id="quiz-year"></p>
            <h2 id="quiz-title"></h2>
          </div>
          <button class="secondary-button" id="back-button" type="button">返回年份</button>
        </div>

        <div class="progress-row">
          <progress id="progress" value="0" max="50"></progress>
          <span id="progress-text">0 / 50</span>
        </div>

        <form id="quiz-form"></form>

        <div class="actions">
          <button class="primary-button" id="submit-button" type="button">交卷</button>
        </div>
      </section>

      <section class="result-panel hidden" id="result-panel" aria-live="polite">
        <div class="result-header">
          <div>
            <p class="eyebrow" id="result-year"></p>
            <h2 id="result-title"></h2>
          </div>
          <button class="secondary-button" id="retry-button" type="button">重新作答</button>
        </div>
        <div class="score-box" id="score-box"></div>
        <div class="wrong-list" id="wrong-list"></div>
      </section>
    </main>

    <script src="questions-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
